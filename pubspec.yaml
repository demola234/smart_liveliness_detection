name: smart_liveliness_detection
description: This package helps you verify that a real person is present in front of the camera, not a photo, video, or mask.
version: 0.3.4
homepage: https://github.com/demola234/smart_liveliness_detection

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.12.0
  # The default Android implementation from camera_android_camerax doesn't support the required image format.
  camera_android: ^0.10.10+16
  google_mlkit_face_detection: ^0.13.2
  sensors_plus: ^7.0.0

  provider: ^6.1.2
  uuid: ^4.5.3
  flutter_tts: ^4.2.5

  cupertino_icons: ^1.0.9
  image_picker: ^1.2.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  build_runner: ^2.13.1

platforms:
  ? android
  ? ios

flutter:
  uses-material-design: true
  assets:
    - assets/gif/
